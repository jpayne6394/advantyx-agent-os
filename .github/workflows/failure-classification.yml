name: Failure Classification

on:
  pull_request:
    types: [labeled, synchronize, reopened]

permissions:
  pull-requests: write
  issues: write

jobs:
  classify:
    runs-on: ubuntu-latest

    steps:
      - name: Classify failure labels
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.issue.number;
            const repo = context.repo;
            const labels = context.payload.pull_request.labels.map(l => l.name);

            async function add(labelsToAdd) {
              if (!labelsToAdd.length) return;
              await github.rest.issues.addLabels({
                ...repo,
                issue_number,
                labels: labelsToAdd
              });
            }

            const classifications = [];

            if (labels.includes('tests-required') || labels.includes('test:fail')) {
              classifications.push('failure:test');
            }
            if (labels.includes('review:fail')) {
              classifications.push('failure:quality');
            }
            if (labels.includes('guard:fail') || labels.includes('routing:unresolved')) {
              classifications.push('failure:scope');
            }
            if (labels.includes('needs-human')) {
              classifications.push('failure:escalated');
            }

            await add(classifications);

            if (classifications.length) {
              await github.rest.issues.createComment({
                ...repo,
                issue_number,
                body: `Failure classified as: ${classifications.join(', ')}`
              });
            }
