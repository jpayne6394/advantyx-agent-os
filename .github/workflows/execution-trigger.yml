name: Execution Trigger

on:
  pull_request:
    types: [labeled]

permissions:
  issues: write

jobs:
  trigger:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger execution comment
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name);
            const issue_number = context.issue.number;

            const lane = labels.find(l => l.startsWith('agent:'));

            if (!lane) return;

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number,
              body: `Execution triggered for ${lane}. Assigned agent should implement, then pass through Reviewer and Guard.`
            });
