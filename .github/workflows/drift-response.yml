name: Drift Response

on:
  pull_request:
    types: [labeled]

permissions:
  pull-requests: write
  issues: write

jobs:
  respond:
    if: contains(join(github.event.pull_request.labels.*.name, ','), 'drift:detected')
    runs-on: ubuntu-latest

    steps:
      - name: Respond to drift
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const labels = pr.labels.map(l => l.name);
            const issue_number = context.issue.number;
            const repo = context.repo;

            let response = null;

            if (labels.includes('routing:unresolved')) {
              response = 'needs-human';
            } else if (labels.includes('tests-required')) {
              response = 'retry:needed';
            } else if (labels.some(l => l.endsWith(':fail'))) {
              response = 'retry:needed';
            } else {
              response = 'analyst:workflow';
            }

            await github.rest.issues.addLabels({
              ...repo,
              issue_number,
              labels: [response]
            });

            await github.rest.issues.createComment({
              ...repo,
              issue_number,
              body: `Drift response applied → ${response}`
            });
