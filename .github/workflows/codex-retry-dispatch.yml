name: Codex Retry Dispatch

on:
  pull_request:
    types: [labeled]

permissions:
  issues: write

jobs:
  retry:
    if: contains(join(github.event.pull_request.labels.*.name, ','), 'retry:')
    runs-on: ubuntu-latest

    steps:
      - name: Dispatch retry to Codex
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const labels = pr.labels.map(l => l.name);
            const issue_number = context.issue.number;

            const retryLabel = labels.find(l => l.startsWith('retry:'));
            if (!retryLabel) return;

            const body = `@codex\n\nTASK: Retry execution for ${retryLabel}.\n\nCONTEXT:\n- Previous attempt failed\n- Review/Guard/Test feedback present in PR\n\nINSTRUCTIONS:\n- Fix issues only\n- Do not expand scope\n- Ensure tests pass\n- Keep changes minimal and targeted`;

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number,
              body
            });
