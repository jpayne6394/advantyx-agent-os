name: Codex Retry Dispatch

on:
  pull_request:
    types: [labeled]

permissions:
  issues: write
  pull-requests: read
  contents: read

jobs:
  retry:
    if: contains(join(github.event.pull_request.labels.*.name, ','), 'retry:')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dispatch retry to Codex
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const pr = context.payload.pull_request;
            const labels = pr.labels.map(l => l.name);
            const issue_number = context.issue.number;

            const retryLabel = labels.find(l => l.startsWith('retry:') && l !== 'retry:needed');
            if (!retryLabel) return;

            let mission = '';
            try {
              mission = fs.readFileSync('docs/current_mission.md', 'utf8');
            } catch (e) {}

            const files = await github.paginate(github.rest.pulls.listFiles, {
              ...context.repo,
              pull_number: issue_number,
              per_page: 100
            });

            const fileSummary = files.map(f => `- ${f.filename} (${f.status})`).join('\n');

            const patchSummary = files
              .filter(f => f.patch)
              .slice(0, 8)
              .map(f => {
                const patch = f.patch.length > 1500 ? `${f.patch.slice(0, 1500)}\n... [truncated]` : f.patch;
                return `FILE: ${f.filename}\nPATCH:\n${patch}`;
              })
              .join('\n\n');

            const issueComments = await github.paginate(github.rest.issues.listComments, {
              ...context.repo,
              issue_number,
              per_page: 100
            });

            const reviewComments = await github.paginate(github.rest.pulls.listReviewComments, {
              ...context.repo,
              pull_number: issue_number,
              per_page: 100
            });

            const commentSummary = issueComments
              .slice(-5)
              .map(c => `COMMENT by ${c.user.login}: ${String(c.body || '').slice(0, 500)}`)
              .join('\n\n');

            const reviewSummary = reviewComments
              .slice(-8)
              .map(c => `REVIEW on ${c.path || 'unknown'} by ${c.user.login}: ${String(c.body || '').slice(0, 400)}`)
              .join('\n\n');

            const failureLabels = labels.filter(l => l.endsWith(':fail') || l === 'tests-required').join(', ');

            const body = `@codex\n\nTASK: Retry execution for ${retryLabel}.\n\nCONTEXT:\n- Previous attempt failed\n- Failure signals: ${failureLabels || 'unknown'}\n\nMISSION:\n${mission}\n\nCHANGED FILES:\n${fileSummary}\n\nDIFF CONTEXT:\n${patchSummary || 'No patch context available.'}\n\nRECENT ISSUE COMMENTS:\n${commentSummary || 'No recent issue comments.'}\n\nRECENT REVIEW FEEDBACK:\n${reviewSummary || 'No recent review comments.'}\n\nINSTRUCTIONS:\n- Fix only the issues causing failure\n- Prioritize review feedback and failing labels\n- Do not expand scope\n- Ensure tests pass\n- Keep changes minimal and targeted\n- Do not modify unrelated files`;

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number,
              body: body.slice(0, 60000)
            });
