name: Test Enforcement

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  enforce:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed files
        id: changes
        uses: tj-actions/changed-files@v44

      - name: Evaluate test requirements
        uses: actions/github-script@v7
        with:
          script: |
            const files = `${{ steps.changes.outputs.all_changed_files }}`.split(' ');
            const labels = context.payload.pull_request.labels.map(l => l.name);

            const codeChanged = files.some(f =>
              f.startsWith('backend/') || f.startsWith('ui/') || f.endsWith('.py') || f.endsWith('.ts')
            );

            const testsChanged = files.some(f => f.startsWith('tests/') || f.includes('.test'));

            const justified = labels.includes('no-tests-justified');

            if (codeChanged && !testsChanged && !justified) {
              await github.rest.issues.addLabels({
                ...context.repo,
                issue_number: context.issue.number,
                labels: ['test:fail','tests-required']
              });
            } else {
              await github.rest.issues.addLabels({
                ...context.repo,
                issue_number: context.issue.number,
                labels: ['test:pass']
              });
            }
