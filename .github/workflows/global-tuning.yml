name: Global Tuning

on:
  schedule:
    - cron: '30 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  tune:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Analyze failures and update tuning
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const repo = context.repo;

            const DECAY = 0.85;

            let scores = { test: 0, scope: 0, quality: 0 };

            try {
              const prev = fs.readFileSync('docs/global-tuning-state.md','utf8');
              const match = prev.match(/test_failure_count: (\d+).*scope_failure_count: (\d+).*quality_failure_count: (\d+)/s);
              if (match) {
                scores.test = parseFloat(match[1]) * DECAY;
                scores.scope = parseFloat(match[2]) * DECAY;
                scores.quality = parseFloat(match[3]) * DECAY;
              }
            } catch(e) {}

            const { data: prs } = await github.rest.pulls.list({ ...repo, state:'open', per_page:100 });

            prs.forEach(pr => {
              const labels = pr.labels.map(l=>l.name);
              if (labels.includes('failure:test')) scores.test += 1;
              if (labels.includes('failure:scope')) scores.scope += 1;
              if (labels.includes('failure:quality')) scores.quality += 1;
            });

            let dominant = 'none';
            const max = Math.max(scores.test, scores.scope, scores.quality);
            if (max === scores.test && max > 2) dominant = 'test';
            if (max === scores.scope && max > 2) dominant = 'scope';
            if (max === scores.quality && max > 2) dominant = 'quality';

            let rules = [];
            if (dominant === 'test') rules.push('- Require strict test coverage and edge cases');
            if (dominant === 'scope') rules.push('- Enforce strict file boundaries and minimal diffs');

            fs.writeFileSync('docs/generated-prompt-rules.md', `# Generated Prompt Rules\n\n## Rules\n\n${rules.join('\n') || '_No rules generated_'}\n`);

            const state = `# Global Tuning State\n\n\`\`\`yaml\ndominant_failure_mode: ${dominant}\ntest_failure_count: ${scores.test.toFixed(2)}\nscope_failure_count: ${scores.scope.toFixed(2)}\nquality_failure_count: ${scores.quality.toFixed(2)}\ndecay_factor: ${DECAY}\nlast_updated: ${new Date().toISOString()}\n\`\`\``;

            fs.writeFileSync('docs/global-tuning-state.md', state);

      - name: Commit tuning outputs
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/global-tuning-state.md docs/generated-prompt-rules.md
          git commit -m "Update global tuning with decay and rules" || echo "No changes"
          git push
