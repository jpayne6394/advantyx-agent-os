name: Retry Execution

on:
  pull_request:
    types: [labeled, synchronize, reopened]

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  retry:
    if: contains(join(github.event.pull_request.labels.*.name, ','), 'retry:needed')
    runs-on: ubuntu-latest

    steps:
      - name: Determine retry lane and priority
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.issue.number;
            const labels = context.payload.pull_request.labels.map(l => l.name);
            const repo = context.repo;

            const lanePriority = [
              'agent:backend',
              'agent:frontend',
              'agent:data',
              'agent:qa',
              'agent:platform'
            ];

            const matchedLane = lanePriority.find(label => labels.includes(label));
            const priority = labels.find(l => l.startsWith('priority:')) || 'priority:normal';

            const { data: prs } = await github.rest.pulls.list({
              ...repo,
              state: 'open',
              per_page: 50
            });

            const higherPriorityRetryExists = prs.some(p => {
              if (p.number === issue_number) return false;
              const pLabels = p.labels.map(l => l.name);
              const pPriority = pLabels.find(l => l.startsWith('priority:')) || 'priority:normal';
              const needsRetry = pLabels.includes('retry:needed');

              const rank = {'priority:high': 3, 'priority:normal': 2, 'priority:low': 1};
              return needsRetry && rank[pPriority] > rank[priority];
            });

            if (higherPriorityRetryExists) {
              await github.rest.issues.addLabels({
                ...repo,
                issue_number,
                labels: ['queue:waiting']
              });
              await github.rest.issues.createComment({
                ...repo,
                issue_number,
                body: `Retry delayed: higher priority retry exists.`
              });
              return;
            }

            if (!matchedLane || labels.includes('routing:unresolved')) {
              await github.rest.issues.addLabels({
                ...repo,
                issue_number,
                labels: ['needs-human']
              });
              return;
            }

            const labelsToRemove = [
              'review:fail',
              'guard:fail',
              'test:fail',
              'test:pass',
              'tests-required',
              'automerge',
              'queue:waiting'
            ];

            for (const name of labelsToRemove) {
              try {
                await github.rest.issues.removeLabel({ ...repo, issue_number, name });
              } catch (e) {}
            }

            const retryLabel = `retry:${matchedLane.replace('agent:','')}`;
            await github.rest.issues.addLabels({
              ...repo,
              issue_number,
              labels: [retryLabel, 'recheck:required']
            });

      - name: Comment retry instructions
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name);
            const retryLabel = labels.find(name => name.startsWith('retry:'));
            const message = retryLabel
              ? `Priority-aware retry activated for ${retryLabel}.` 
              : 'Retry loop activated.';

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: message
            });
