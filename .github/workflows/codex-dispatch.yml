name: Codex Dispatch

on:
  pull_request:
    types: [opened, labeled, synchronize]

permissions:
  issues: write
  contents: read
  pull-requests: read

jobs:
  dispatch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dispatch to Codex
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const pr = context.payload.pull_request;
            const labels = pr.labels.map(l => l.name);
            const issue_number = context.issue.number;

            const lane = labels.find(l => l.startsWith('agent:'));
            if (!lane) return;

            let overlay = '';

            if (lane === 'agent:backend') {
              overlay = `BACKEND MODE:\n- modify backend only\n- preserve API contracts\n- prefer minimal service/router updates\n- include tests\n- avoid schema changes unless required`;
            }
            if (lane === 'agent:frontend') {
              overlay = `FRONTEND MODE:\n- modify UI only\n- do not change backend behavior\n- maintain layout consistency\n- ensure usability`;
            }
            if (lane === 'agent:data') {
              overlay = `DATA MODE:\n- safe migrations only\n- ensure reversibility\n- validate data integrity\n- document assumptions`;
            }
            if (lane === 'agent:platform') {
              overlay = `PLATFORM MODE:\n- modify workflows/infra only\n- maintain security posture\n- avoid product logic changes`;
            }

            let perPrTuning = '';

            if (labels.includes('tune:tests')) {
              perPrTuning += '- enforce strong test coverage\n- include edge cases\n- validate behavior before completion\n';
            }

            if (labels.includes('tune:scope')) {
              perPrTuning += '- strictly limit changes to assigned lane\n- avoid unrelated refactors\n- minimize file changes\n';
            }

            if (labels.includes('pressure:retry-surge')) {
              perPrTuning += '- prioritize minimal targeted fixes\n- avoid broad rewrites\n';
            }

            if (labels.includes('pressure:stale-backlog')) {
              perPrTuning += '- prefer smallest complete solution\n- reduce exploratory work\n';
            }

            if (labels.includes('pressure:human-overload')) {
              perPrTuning += '- avoid escalation triggers\n- produce clean, reviewable diffs\n';
            }

            let globalRules = '_No global tuning rules available._';
            try {
              globalRules = fs.readFileSync('docs/generated-prompt-rules.md', 'utf8');
            } catch (e) {}

            let mission = '';
            try {
              mission = fs.readFileSync('docs/current_mission.md', 'utf8');
            } catch (e) {}

            const files = await github.paginate(github.rest.pulls.listFiles, {
              ...context.repo,
              pull_number: issue_number,
              per_page: 100
            });

            const changedFiles = files.map(f => `- ${f.filename}`).join('\n') || '- none';

            let template = fs.readFileSync('docs/codex-prompt-template.md', 'utf8');
            template = template
              .replace('{{MODE}}', overlay)
              .replace('{{GLOBAL_TUNING_RULES}}', globalRules)
              .replace('{{PER_PR_TUNING}}', perPrTuning || '_No per-PR tuning applied._')
              .replace('{{MISSION}}', mission)
              .replace('{{FILES}}', changedFiles);

            const body = `@codex\n\n${template}`;

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number,
              body: body.slice(0, 60000)
            });
