name: Codex Dispatch

on:
  pull_request:
    types: [opened, labeled, synchronize]

permissions:
  issues: write
  contents: read
  pull-requests: read

jobs:
  dispatch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dispatch to Codex
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const pr = context.payload.pull_request;
            const labels = pr.labels.map(l => l.name);
            const issue_number = context.issue.number;

            const lane = labels.find(l => l.startsWith('agent:'));
            if (!lane) return;

            let overlay = '';

            if (lane === 'agent:backend') {
              overlay = `BACKEND MODE:\n- modify backend only\n- preserve API contracts\n- prefer minimal service/router updates\n- include tests\n- avoid schema changes unless required`;
            }
            if (lane === 'agent:frontend') {
              overlay = `FRONTEND MODE:\n- modify UI only\n- do not change backend behavior\n- maintain layout consistency\n- ensure usability`;
            }
            if (lane === 'agent:data') {
              overlay = `DATA MODE:\n- safe migrations only\n- ensure reversibility\n- validate data integrity\n- document assumptions`;
            }
            if (lane === 'agent:platform') {
              overlay = `PLATFORM MODE:\n- modify workflows/infra only\n- maintain security posture\n- avoid product logic changes`;
            }

            let mission = '';
            try {
              mission = fs.readFileSync('docs/current_mission.md', 'utf8');
            } catch (e) {}

            const files = await github.paginate(github.rest.pulls.listFiles, {
              ...context.repo,
              pull_number: issue_number,
              per_page: 100
            });

            const changedFiles = files.map(f => `- ${f.filename}`).join('\n') || '- none';

            const body = `@codex\n\nTASK: Execute implementation for ${lane}.\n\n${overlay}\n\nMISSION:\n${mission}\n\nFILES:\n${changedFiles}\n\nRULES:\n- stay within lane\n- do not expand scope\n- produce minimal diff\n- add tests where required`;

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number,
              body: body.slice(0, 60000)
            });
