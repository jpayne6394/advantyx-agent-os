name: Guard

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

permissions:
  pull-requests: write
  contents: read

jobs:
  guard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed files
        id: changes
        uses: tj-actions/changed-files@v44

      - name: Apply guard decision
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.issue.number;
            const repo = context.repo;
            const pr = context.payload.pull_request;
            const labels = pr.labels.map(l => l.name);
            const files = `${{ steps.changes.outputs.all_changed_files }}`.split(' ').filter(Boolean);

            const touchedBackend = files.some(f => f.startsWith('backend/'));
            const touchedFrontend = files.some(f => f.startsWith('ui/'));
            const touchedData = files.some(f => f.startsWith('db/') || f.startsWith('migrations/'));

            const multiLane = [touchedBackend, touchedFrontend, touchedData].filter(Boolean).length > 1;

            async function removeLabel(name) {
              try {
                await github.rest.issues.removeLabel({ ...repo, issue_number, name });
              } catch (e) {}
            }

            await removeLabel('guard:pass');
            await removeLabel('guard:fail');

            if (multiLane) {
              await github.rest.issues.addLabels({
                ...repo,
                issue_number,
                labels: ['guard:fail','routing:unresolved']
              });
              await github.rest.issues.createComment({
                ...repo,
                issue_number,
                body: 'Guard failed: multiple execution lanes detected in a single PR.'
              });
              return;
            }

            if (labels.includes('needs-human')) {
              await github.rest.issues.addLabels({
                ...repo,
                issue_number,
                labels: ['guard:fail']
              });
              return;
            }

            await github.rest.issues.addLabels({
              ...repo,
              issue_number,
              labels: ['guard:pass']
            });
