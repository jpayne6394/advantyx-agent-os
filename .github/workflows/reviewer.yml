name: Reviewer

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]

permissions:
  pull-requests: write
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed files
        id: changes
        uses: tj-actions/changed-files@v44

      - name: Apply reviewer decision
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.issue.number;
            const repo = context.repo;
            const pr = context.payload.pull_request;
            const labels = pr.labels.map(l => l.name);
            const files = `${{ steps.changes.outputs.all_changed_files }}`.split(' ').filter(Boolean);
            const changedCount = files.length;

            const blocking = ['routing:unresolved', 'test:fail', 'needs-human', 'do-not-merge'];
            const hasBlocking = blocking.some(label => labels.includes(label));
            const hasTests = labels.includes('test:pass');
            const hasLane = labels.some(label => label.startsWith('agent:'));
            const tooLarge = changedCount > 40;

            async function removeLabel(name) {
              try {
                await github.rest.issues.removeLabel({ ...repo, issue_number, name });
              } catch (e) {}
            }

            await removeLabel('review:pass');
            await removeLabel('review:fail');

            if (!hasLane || hasBlocking || tooLarge || !hasTests) {
              await github.rest.issues.addLabels({
                ...repo,
                issue_number,
                labels: ['review:fail']
              });
              const reasons = [
                !hasLane ? 'no execution lane assigned' : null,
                hasBlocking ? 'blocking label present' : null,
                tooLarge ? 'change set too large for autonomous review' : null,
                !hasTests ? 'tests not passed' : null
              ].filter(Boolean).join(', ');
              await github.rest.issues.createComment({
                ...repo,
                issue_number,
                body: `Reviewer failed this PR: ${reasons}.`
              });
              return;
            }

            await github.rest.issues.addLabels({
              ...repo,
              issue_number,
              labels: ['review:pass']
            });
            await github.rest.issues.createComment({
              ...repo,
              issue_number,
              body: 'Reviewer passed this PR based on routing, test status, and bounded change size.'
            });
